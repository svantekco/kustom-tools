<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Markdown Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" media="(prefers-color-scheme: light)" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)" />
<style>
  :root { color-scheme: light dark; }
  html { font-size: 16px; }
  body {
    margin: 0;
    padding: 2rem 1rem;
    background: Canvas;
    color: CanvasText;
    font-family: "Albert Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 1rem;
    line-height: 1.6;
  }
  main.markdown-body {
    font-family: "Albert Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 1rem;
    box-sizing: border-box;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem;
    background: Canvas;
    scroll-margin-top: 1rem;
  }
  main.markdown-body :is(h1, h2, h3, h4, h5, h6) {
    scroll-margin-top: 1rem;
  }
  nav.toc {
    position: fixed;
    top: 2rem;
    left: 1rem;
    width: 260px;
    max-height: calc(100vh - 4rem);
    overflow-y: auto;
    padding: 1rem 1rem 1rem 0.75rem;
    border-left: 1px solid #d0d7de;
    font-size: 0.875rem;
    line-height: 1.45;
  }
  nav.toc[hidden] { display: none; }
  nav.toc .toc-title {
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 0.75rem;
    color: #57606a;
    margin: 0 0 0.5rem;
  }
  nav.toc ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  nav.toc li { margin: 0; }
  nav.toc a {
    display: block;
    padding: 0.2rem 0.5rem;
    border-left: 2px solid transparent;
    margin-left: -2px;
    color: inherit;
    text-decoration: none;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  nav.toc a:hover { color: #0969da; }
  nav.toc a.level-2 { padding-left: 0.5rem; }
  nav.toc a.level-3 { padding-left: 1.5rem; font-size: 0.8125rem; }
  nav.toc a.active {
    border-left-color: #0969da;
    color: #0969da;
    font-weight: 600;
  }
  @media (prefers-color-scheme: dark) {
    nav.toc { border-left-color: #30363d; }
    nav.toc .toc-title { color: #8b949e; }
    nav.toc a:hover, nav.toc a.active { color: #58a6ff; }
    nav.toc a.active { border-left-color: #58a6ff; }
  }
  @media (min-width: 1200px) {
    body { padding-left: 340px; }
  }
  @media (max-width: 1199px) {
    nav.toc { display: none; }
  }
  @media (max-width: 767px) {
    body { padding: 0.5rem; }
    main.markdown-body { padding: 1rem; }
  }
  .status {
    max-width: 860px;
    margin: 0 auto 1rem;
    padding: 0.75rem 1rem;
    border-radius: 6px;
    border: 1px solid #d0d7de;
    background: #f6f8fa;
    color: #1f2328;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 0.875rem;
  }
  .status.error { border-color: #ffcecb; background: #ffebe9; color: #82071e; }
  @media (prefers-color-scheme: dark) {
    .status { background: #161b22; border-color: #30363d; color: #e6edf3; }
    .status.error { background: #2d0d11; border-color: #f85149; color: #ff8182; }
  }
</style>
</head>
<body>
<div id="status" class="status" hidden></div>
<nav id="toc" class="toc" aria-label="Table of contents" hidden>
  <p class="toc-title">On this page</p>
  <ul id="toc-list"></ul>
</nav>
<main id="content" class="markdown-body" hidden></main>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
<script>
  const statusEl = document.getElementById('status');
  const contentEl = document.getElementById('content');

  function showStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.classList.toggle('error', !!isError);
    statusEl.hidden = false;
  }

  function safeFile(name) {
    // Disallow path traversal and absolute paths; allow simple filenames and nested paths under docs/.
    if (!name) return null;
    if (name.includes('..') || name.startsWith('/') || name.includes('\\')) return null;
    if (!/^[A-Za-z0-9_\-./]+$/.test(name)) return null;
    return name;
  }

  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight(code, lang) {
      try {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      } catch (_) {
        return code;
      }
    },
  });

  // Make relative links/images inside the doc resolve against docs/<file>'s directory.
  function rewriteRelativeUrls(rootEl, baseUrl) {
    const base = new URL(baseUrl, window.location.href);
    rootEl.querySelectorAll('a[href]').forEach(a => {
      const href = a.getAttribute('href');
      if (!href || /^[a-z]+:|^#|^\/\//i.test(href) || href.startsWith('/')) return;
      // Rewrite .md links so they open in the viewer.
      if (/\.md(\?|#|$)/i.test(href)) {
        const resolved = new URL(href, base);
        const docsBase = new URL('docs/', window.location.href);
        if (resolved.href.startsWith(docsBase.href)) {
          const rel = resolved.href.slice(docsBase.href.length);
          a.href = `?file=${encodeURIComponent(rel)}`;
          return;
        }
      }
      a.href = new URL(href, base).href;
    });
    rootEl.querySelectorAll('img[src]').forEach(img => {
      const src = img.getAttribute('src');
      if (!src || /^[a-z]+:|^\/\//i.test(src) || src.startsWith('/')) return;
      img.src = new URL(src, base).href;
    });
  }

  let tocObserver = null;

  function slugify(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^\w\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '') || 'section';
  }

  function buildToc(rootEl) {
    const tocEl = document.getElementById('toc');
    const listEl = document.getElementById('toc-list');
    listEl.innerHTML = '';
    if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }

    const headings = Array.from(rootEl.querySelectorAll('h2, h3'));
    if (headings.length < 2) {
      tocEl.hidden = true;
      return;
    }

    const usedIds = new Set();
    const links = new Map();
    headings.forEach(h => {
      let id = h.id || slugify(h.textContent);
      let unique = id, n = 2;
      while (usedIds.has(unique)) unique = `${id}-${n++}`;
      h.id = unique;
      usedIds.add(unique);

      const level = Number(h.tagName.slice(1));
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = `#${unique}`;
      a.textContent = h.textContent;
      a.className = `level-${level}`;
      a.addEventListener('click', (e) => {
        e.preventDefault();
        h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        history.replaceState(null, '', `#${unique}`);
      });
      li.appendChild(a);
      listEl.appendChild(li);
      links.set(h, a);
    });

    tocEl.hidden = false;

    const visible = new Set();
    tocObserver = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) visible.add(en.target);
        else visible.delete(en.target);
      });
      let active = null;
      if (visible.size) {
        active = headings.filter(h => visible.has(h))
          .sort((a, b) => a.getBoundingClientRect().top - b.getBoundingClientRect().top)[0];
      } else {
        for (const h of headings) {
          if (h.getBoundingClientRect().top < 80) active = h;
          else break;
        }
        if (!active) active = headings[0];
      }
      links.forEach((a, h) => a.classList.toggle('active', h === active));
    }, { rootMargin: '-72px 0px -70% 0px', threshold: 0 });

    headings.forEach(h => tocObserver.observe(h));
  }

  async function load() {
    const params = new URLSearchParams(window.location.search);
    const requested = params.get('file');
    if (!requested) {
      showStatus('No file specified. Use ?file=example.md', true);
      return;
    }
    const file = safeFile(requested);
    if (!file) {
      showStatus(`Invalid file path: ${requested}`, true);
      return;
    }
    const url = `docs/${file}`;
    try {
      const res = await fetch(url, { cache: 'no-cache' });
      if (!res.ok) {
        showStatus(`Failed to load ${url} (HTTP ${res.status})`, true);
        return;
      }
      const md = await res.text();
      const rawHtml = marked.parse(md);
      const clean = DOMPurify.sanitize(rawHtml);
      contentEl.innerHTML = clean;
      rewriteRelativeUrls(contentEl, url);
      contentEl.hidden = false;
      statusEl.hidden = true;

      const firstHeading = contentEl.querySelector('h1, h2, h3');
      document.title = firstHeading ? `${firstHeading.textContent} — Markdown Viewer` : `${file} — Markdown Viewer`;

      buildToc(contentEl);
      if (window.location.hash) {
        const target = document.getElementById(decodeURIComponent(window.location.hash.slice(1)));
        if (target) target.scrollIntoView();
      }
    } catch (err) {
      showStatus(`Error loading ${url}: ${err.message}`, true);
    }
  }

  load();
</script>
</body>
</html>
